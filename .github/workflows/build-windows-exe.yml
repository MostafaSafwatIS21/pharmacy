name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: pharmacy-pos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pharmacy-pos/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer and portable EXE
        run: npm run dist:win

      - name: Upload EXE artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pharmacy-pos-windows-exe
          path: |
            pharmacy-pos/release/*.exe
            pharmacy-pos/release/*.yml
          if-no-files-found: error
